name: barangay_admin_web
description: "Barangay Admin Web Dashboard"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  flutter_quill: ^11.5.0
  image_picker: ^1.1.2
  path: ^1.9.0
  mime: ^2.0.0
  flutter_svg: ^2.2.4

  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/Assets/
